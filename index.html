<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffb3d9 0%, #ff80bf 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .menu-container {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2.2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .menu-btn {
            background: linear-gradient(135deg, #ff99cc 0%, #ff66b2 100%);
            color: white;
            border: none;
            padding: 20px 25px;
            font-size: 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-decoration: none;
            display: block;
            box-shadow: 0 5px 15px rgba(255,102,178,0.3);
        }
        
        .menu-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255,102,178,0.4);
        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .description {
            color: #e0c9d4;
            font-size: 14px;
            opacity: 0.9;
            margin-top: 8px;
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        @media (max-width: 600px) {
            .menu-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .menu-btn {
                padding: 15px 20px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>Колесо Фортуны</h1>
        <div class="subtitle">Выберите рулетку:</div>
        
        <div class="menu-buttons">
            <a href="wheel_napitki/" class="menu-btn">
                Рулетка с напитками
                <div class="description">50 уникальных напитков</div>
            </a>
            
            <a href="wheel_syrups/" class="menu-btn">
                Рулетка с сиропами
                <div class="description">18 комбинаций сиропов</div>
            </a>
        </div>
        
        <div class="footer">
            🔥 — горячие напитки &nbsp;&nbsp;|&nbsp;&nbsp; ❄️ — холодные напитки
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
    </script>
</body>
</html>
